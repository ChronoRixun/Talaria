# Automated build + unit-test check for the Talaria iOS app.
#
# Why this exists: Claude Code "on the web" sessions run in a Linux container
# with no Xcode toolchain, so they cannot run the `** BUILD SUCCEEDED **` gate
# locally. This workflow runs that gate on a macOS runner for every push to the
# working branches and every PR into main, so source edits made from the web
# get an automated compile/test signal. (Interactive simulator/device runtime
# verification still has to happen on a Mac.)
#
# Tunables you may need to adjust after the first run (the project targets
# iOS 26 / Xcode 26.3, which only exists on recent runner images):
#   * runs-on:        pin to a specific image (e.g. macos-26) if `macos-latest`
#                     doesn't ship Xcode 26.x.
#   * Xcode select:   change the version preferred in the "Select Xcode" step.
# The simulator for the test step is resolved dynamically, so no device name is
# hard-coded here.

name: iOS Build

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'claude/**'
  pull_request:
    branches: [main]
  workflow_dispatch:

# Newer pushes to the same ref supersede in-flight runs (macOS minutes are
# billed at a high multiplier, so don't waste them on stale commits).
concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & unit-test (iOS Simulator)
    runs-on: macos-latest
    timeout-minutes: 45
    env:
      PROJECT: Talaria.xcodeproj
      SCHEME: Talaria
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (prefer 26.3, then newest 26.x)
        run: |
          set -euo pipefail
          echo "Installed Xcodes:"
          ls -d /Applications/Xcode*.app 2>/dev/null || true
          if [ -d "/Applications/Xcode_26.3.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.3.app
          else
            latest="$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1 || true)"
            if [ -n "${latest}" ]; then
              echo "Xcode_26.3 not found; using ${latest}"
              sudo xcode-select -s "${latest}"
            else
              echo "::warning::No Xcode 26.x found on this runner; using the default Xcode. The iOS 26 SDK may be unavailable — pin a runner image that has it."
            fi
          fi
          xcodebuild -version
          echo "Available iOS SDKs:"
          xcodebuild -showsdks | grep -i ios || true

      - name: Install tools (XcodeGen, xcbeautify)
        run: brew install xcodegen xcbeautify

      # project.yml is the source of truth — regenerate so newly added source
      # files are picked up (a stale committed .xcodeproj would build green
      # while silently omitting new files).
      - name: Generate Xcode project from project.yml
        run: xcodegen generate

      - name: Resolve Swift packages
        run: |
          set -o pipefail
          xcodebuild -resolvePackageDependencies \
            -project "$PROJECT" -scheme "$SCHEME" \
            | xcbeautify --renderer github-actions

      - name: Build (iOS Simulator, no signing)
        run: |
          set -o pipefail
          xcodebuild build \
            -project "$PROJECT" -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Unit tests (TalariaTests)
        run: |
          set -o pipefail
          # Let xcodebuild resolve the simulator by name. iPhone 17 Pro Max is
          # the project's target device and is present on the runner; resolving a
          # UDID ourselves via `simctl` can pick a device xcodebuild treats as
          # ineligible. Change the device name here if a runner image drops it.
          xcodebuild test \
            -project "$PROJECT" -scheme "$SCHEME" \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro Max,OS=latest' \
            -only-testing:TalariaTests \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions
